<!DOCTYPE html>
<html>
    <head>
        <title>JSON & LOCALSTORAGE</title>
    </head>
    <body>
        <script>
            const obj = {
                name:'priyanka',
                age:22,
                class:5,
                totalmarks:97,
                rating: {
                    stars:4.5,
                    count:89,
                },
                fun: function function1(){
                    console.log('function inside object');
                }
            };

        //to convert javascript object to json we use the above syntax:
        console.log(JSON.stringify(obj));
        //to convert json back to javascript object we use the below syntax:
        const jsonObj = JSON.stringify(obj);
        console.log(JSON.parse(jsonObj));
            console.log(obj);
            console.log(obj.name);
            console.log(obj.age);
            console.log(obj.class);
            console.log(obj.totalmarks);
            console.log(obj.rating.stars);
            console.log(obj.rating.count);
            obj.fun();
        </script>

    </body>
</html>

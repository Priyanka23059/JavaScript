<!DOCTYPE html>
<html>
    <head>
        <title>Logical Operators</title>
    </head>
    <body>
        <script>
           if(8>10 || 10>8){
            console.log('it is not true');
           }
           else if(10>8 && 8>10) {
            console.log('it is true');
           }
           else{
            console.log('it is false');
           }
        </script>

    </body>
</html>

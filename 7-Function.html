<!DOCTYPE html>
<html>
    <head>
        <title>Function</title>
    </head>
    <body>
        <script>
            //function with return statement 
            function add(a,b)
            {
                return a+b;
            }
            console.log(add(5,3));

            function ConverttoFahrenheit(celsius)
            {
                return (celsius * 9/5) + 32;
            }
            console.log(ConverttoFahrenheit(0));

            //function without return statement
            function greet(){
                console.log('hello');
            }
            greet();


            function greet(name){
                console.log('hello' + name);
            }
            greet('priyanka');

        </script>

    </body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>TYPES OF IF STATEMENT </title>
</head>
<body>
<script>
    //TERNARY OPERATOR
    const result = 5 ? 'truty' : 'falsy';
    console.log(result);
    const result2 = 0 ? 'truty' : 'falsy';
    console.log(result2);
    //GUARD OPERATOR
    const result3 = 5 && 'truty';
    console.log(result3);
    const result4 = 0 && 'truty';
    console.log(result4);
    //DEFAULT OPERATOR
    const result5 = 5 || 'truty';
    console.log(result5);
    const result6 = 0 || 'truty';
    console.log(result6);
</script>    
</body>
</html>
